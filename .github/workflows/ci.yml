name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Lint GitHub workflows
        run: actionlint -color

      - name: Write workflow lint summary
        if: always()
        run: |
          {
            echo "## workflow-lint"
            echo "- Status: ${{ job.status }}"
            echo "- Checked: .github/workflows/*.yml"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-tests:
    name: backend-tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies and audit tooling
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pip-audit

      - name: Static syntax check
        run: python -m compileall backend

      - name: Audit backend dependencies
        if: matrix.python-version == '3.12'
        working-directory: backend
        run: python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Run backend pytest suite
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee ../backend-pytest-py${{ matrix.python-version }}.log

      - name: Upload backend pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-log-py${{ matrix.python-version }}
          path: backend-pytest-py${{ matrix.python-version }}.log
          retention-days: 7

      - name: Write backend test summary
        if: always()
        run: |
          {
            echo "## backend-tests / Python ${{ matrix.python-version }}"
            echo "- Status: ${{ job.status }}"
            echo "- Checks: compileall, pytest"
            if [ "${{ matrix.python-version }}" = "3.12" ]; then
              echo "- Security: pip-audit"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  backend-smoke:
    name: backend-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: backend-tests
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          DEVCONTROL_PASSWORD: ci-password
        run: |
          python app.py > ../backend-smoke.log 2>&1 &
          echo $! > ../backend-smoke.pid

      - name: Wait for backend readiness
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/api/system/info"
          deadline = time.time() + 30
          last_error = None

          while time.time() < deadline:
            try:
              with urllib.request.urlopen(url, timeout=3) as response:
                if response.status == 200:
                  print("Backend is ready")
                  raise SystemExit(0)
            except Exception as exc:
              last_error = exc
              time.sleep(1)

          raise SystemExit(f"Backend failed to become ready: {last_error}")
          PY

      - name: Backend API smoke tests
        run: |
          python - <<'PY'
          import http.cookiejar
          import json
          import urllib.error
          import urllib.request

          BASE = "http://127.0.0.1:8000"
          cookies = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cookies))

          def request_json(path, method="GET", body=None, headers=None, expected_status=200):
            data = None
            request_headers = headers or {}
            if body is not None:
              data = json.dumps(body).encode("utf-8")
              request_headers = {**request_headers, "Content-Type": "application/json"}

            request = urllib.request.Request(
              f"{BASE}{path}",
              data=data,
              headers=request_headers,
              method=method
            )

            try:
              with opener.open(request, timeout=10) as response:
                payload = json.loads(response.read().decode("utf-8"))
                assert response.status == expected_status, (path, response.status, payload)
                return payload
            except urllib.error.HTTPError as exc:
              payload = json.loads(exc.read().decode("utf-8"))
              assert exc.code == expected_status, (path, exc.code, payload)
              return payload

          auth_status = request_json("/api/auth/status")
          assert auth_status["enabled"] is True
          assert auth_status["session_active"] is False

          invalid = request_json("/api/auth/validate", method="POST", body={"password": "wrong"})
          assert invalid["valid"] is False

          valid = request_json("/api/auth/validate", method="POST", body={"password": "ci-password"})
          assert valid["valid"] is True

          create_session = request_json("/api/auth/session", method="POST", body={"password": "ci-password"})
          assert create_session["valid"] is True
          assert create_session["session_active"] is True

          auth_status_after_login = request_json("/api/auth/status")
          assert auth_status_after_login["session_active"] is True

          system_info = request_json("/api/system/info")
          assert system_info["hostname"]

          performance = request_json("/api/system/performance")
          assert "cpu_percent" in performance

          processes = request_json("/api/processes")
          assert isinstance(processes, list)

          ports = request_json("/api/ports")
          assert isinstance(ports, list)

          network = request_json("/api/network/info")
          assert "interfaces" in network

          cookie_authorized = request_json(
            "/api/commands/run",
            method="POST",
            body={"command": "echo cookie ci"}
          )
          assert cookie_authorized["success"] is True
          assert "cookie ci" in cookie_authorized["stdout"].lower()

          delete_session = request_json("/api/auth/session", method="DELETE")
          assert delete_session["success"] is True
          assert delete_session["session_active"] is False

          auth_status_after_logout = request_json("/api/auth/status")
          assert auth_status_after_logout["session_active"] is False

          unauthorized = request_json(
            "/api/commands/run",
            method="POST",
            body={"command": "echo unauthorized"},
            expected_status=401
          )
          assert "error" in unauthorized

          authorized = request_json(
            "/api/commands/run",
            method="POST",
            body={"command": "echo ci"},
            headers={"X-DevControl-Password": "ci-password"}
          )
          assert authorized["success"] is True
          assert "ci" in authorized["stdout"].lower()

          request_json(
            "/api/port/65535",
            method="DELETE",
            headers={"X-DevControl-Password": "ci-password"},
            expected_status=404
          )

          print("Backend smoke tests passed")
          PY

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend-smoke.pid ]; then
            kill "$(cat backend-smoke.pid)" || true
          fi

      - name: Upload backend smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-smoke-log
          path: backend-smoke.log
          retention-days: 7

      - name: Write backend smoke summary
        if: always()
        run: |
          {
            echo "## backend-smoke"
            echo "- Status: ${{ job.status }}"
            echo "- Smoke coverage: auth status, session login/logout, protected command auth, telemetry endpoints"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-lint:
    name: frontend-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Write frontend lint summary
        if: always()
        run: |
          {
            echo "## frontend-lint"
            echo "- Status: ${{ job.status }}"
            echo "- Check: ESLint"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

      - name: Write frontend build summary
        if: always()
        run: |
          {
            echo "## frontend-build"
            echo "- Status: ${{ job.status }}"
            echo "- Artifact: frontend-dist"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-unit:
    name: frontend-unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm run test

      - name: Write frontend unit summary
        if: always()
        run: |
          {
            echo "## frontend-unit"
            echo "- Status: ${{ job.status }}"
            echo "- Check: Vitest"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-e2e:
    name: frontend-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          retention-days: 7

      - name: Write frontend E2E summary
        if: always()
        run: |
          {
            echo "## frontend-e2e"
            echo "- Status: ${{ job.status }}"
            echo "- Check: Playwright"
          } >> "$GITHUB_STEP_SUMMARY"

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

      - name: Write dependency review summary
        if: always()
        run: |
          {
            echo "## dependency-review"
            echo "- Status: ${{ job.status }}"
            echo "- Trigger: pull_request only"
          } >> "$GITHUB_STEP_SUMMARY"

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy SARIF artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 7

      - name: Write security scan summary
        if: always()
        run: |
          {
            echo "## security-scan"
            echo "- Status: ${{ job.status }}"
            echo "- Tooling: Trivy filesystem scan + SARIF upload"
          } >> "$GITHUB_STEP_SUMMARY"
